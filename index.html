<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻星空树枝</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0d1b3e;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    position: fixed; top: 0; left: 0;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<script>
(() => {
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;
  let time = 0;

  let growProgress = 0;
  const GROW_DURATION = 3.5;
  let postGrowTime = 0;

  let branches = [];
  let ornaments = [];
  let bgStars = [];
  let dustMotes = [];
  let shootingStars = [];

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    rebuild();
  }

  function rebuild() {
    branches = [];
    ornaments = [];
    bgStars = [];
    dustMotes = [];
    shootingStars = [];
    growProgress = 0;
    postGrowTime = 0;

    generateTree(W * 0.75, H * 1.15, -Math.PI / 2 - 0.35, H * 0.40, 0, 13, 0);
    generateTree(W * 0.87, H * 1.12, -Math.PI / 2 + 0.0, H * 0.35, 0, 12, 1);
    generateTree(W * 0.97, H * 1.10, -Math.PI / 2 + 0.30, H * 0.28, 0, 11, 2);

    attachOrnaments();

    const starCount = Math.floor(W * H / 2500);
    for (let i = 0; i < starCount; i++) {
      bgStars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: 0.2 + Math.random() * 1.2,
        alpha: 0.1 + Math.random() * 0.45,
        speed: 0.3 + Math.random() * 1.5,
        phase: Math.random() * Math.PI * 2
      });
    }

    const dustCount = Math.floor(W * H / 10000);
    for (let i = 0; i < dustCount; i++) {
      dustMotes.push({
        x: Math.random() * W, y: Math.random() * H,
        r: 0.3 + Math.random() * 1.5,
        vx: (Math.random() - 0.5) * 0.2,
        vy: -0.03 - Math.random() * 0.12,
        alpha: 0.06 + Math.random() * 0.2,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function generateTree(x, y, angle, len, depth, maxDepth, seed) {
    if (depth >= maxDepth || len < 3) return;
    const ex = x + Math.cos(angle) * len;
    const ey = y + Math.sin(angle) * len;
    const thickness = Math.max(0.2, (maxDepth - depth) * 0.12);
    branches.push({
      x1: x, y1: y, x2: ex, y2: ey,
      depth, thickness,
      phase: seed * 7.3 + depth * 1.1 + Math.random() * 0.5,
      swayAmt: depth > 3 ? 3.0 + Math.random() * 4.0 : 1.0 + Math.random() * 1.5,
      swaySpeed: 0.25 + Math.random() * 0.35,
      maxDepth
    });
    const count = depth < 2 ? 3 : (depth < 5 ? 2 : 1 + (Math.random() < 0.5 ? 1 : 0));
    for (let i = 0; i < count; i++) {
      const spread = depth < 3 ? 0.6 : 0.45;
      const na = angle + (Math.random() - 0.5) * spread * 2;
      const nl = len * (0.6 + Math.random() * 0.15);
      generateTree(ex, ey, na, nl, depth + 1, maxDepth, seed + i * 3.7);
    }
  }

  function attachOrnaments() {
    const candidates = branches.filter(b =>
      b.depth >= 4 && b.x2 > 0 && b.x2 < W && b.y2 > 0 && b.y2 < H
    );
    const ornamentCount = Math.min(
      Math.floor(candidates.length * 0.30),
      Math.floor(W * H / 8000)
    );
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    for (let i = 0; i < ornamentCount && i < candidates.length; i++) {
      const b = candidates[i];
      const isMoon = Math.random() < 0.28;
      const size = isMoon ? (3.5 + Math.random() * 5) : (2 + Math.random() * 4);
      const threadLen = 50 + Math.random() * 150;
      ornaments.push({
        branchRef: b,
        type: isMoon ? 'moon' : 'star',
        size, threadLen,
        phase: Math.random() * Math.PI * 2,
        swayAmt: 3.0 + Math.random() * 5.0,
        swaySpeed: 0.2 + Math.random() * 0.3,
        glowR: size * 2.5 + Math.random() * 10,
        twinkleSpeed: 0.4 + Math.random() * 1.5,
        rotation: Math.random() * Math.PI * 2,
        fallDelay: Math.random() * 4.0,
        fallDuration: 2.5 + Math.random() * 2.0,
        fallStartY: -30 - Math.random() * H * 0.4,
        swayPhase: Math.random() * Math.PI * 2,
        freqX: 0.3 + Math.random() * 0.2,
        freqY: 0.25 + Math.random() * 0.2,
        dampX: 0.96 + Math.random() * 0.03,
        dampY: 0.96 + Math.random() * 0.03
      });
    }
    const freeCount = Math.floor(W * H / 15000);
    for (let i = 0; i < freeCount; i++) {
      const isMoon = Math.random() < 0.25;
      ornaments.push({
        branchRef: null,
        type: isMoon ? 'moon' : 'star',
        size: isMoon ? (2.5 + Math.random() * 4.5) : (1.5 + Math.random() * 3),
        threadLen: 0,
        baseX: Math.random() * W * 0.55,
        baseY: Math.random() * H,
        phase: Math.random() * Math.PI * 2,
        swayAmt: 2.0 + Math.random() * 3.0,
        swaySpeed: 0.15 + Math.random() * 0.25,
        glowR: 4 + Math.random() * 8,
        twinkleSpeed: 0.4 + Math.random() * 1.2,
        rotation: Math.random() * Math.PI * 2,
        fallDelay: 0, fallDuration: 0, fallStartY: 0,
        swayPhase: 0, freqX: 0, freqY: 0, dampX: 0, dampY: 0
      });
    }
  }

  function spawnShootingStar() {
    if (Math.random() < 0.003) {
      const startX = Math.random() * W * 0.8;
      const startY = Math.random() * H * 0.4;
      const angle = Math.PI * 0.15 + Math.random() * 0.3;
      const speed = 4 + Math.random() * 6;
      const length = 60 + Math.random() * 120;
      shootingStars.push({
        x: startX, y: startY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        length, life: 1.0,
        decay: 0.015 + Math.random() * 0.01
      });
    }
  }

  function updateAndDrawShootingStars() {
    spawnShootingStar();
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.x += s.vx; s.y += s.vy; s.life -= s.decay;
      if (s.life <= 0) { shootingStars.splice(i, 1); continue; }
      const mag = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
      const tailX = s.x - (s.vx / mag) * s.length * s.life;
      const tailY = s.y - (s.vy / mag) * s.length * s.life;
      const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
      grad.addColorStop(0, 'rgba(255, 255, 255, 0)');
      grad.addColorStop(0.7, `rgba(200, 220, 255, ${s.life * 0.3})`);
      grad.addColorStop(1, `rgba(255, 255, 255, ${s.life * 0.8})`);
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${s.life * 0.9})`;
      ctx.fill();
    }
  }

  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, W * 0.2, H);
    grad.addColorStop(0, '#091535');
    grad.addColorStop(0.35, '#0f2555');
    grad.addColorStop(0.65, '#183d75');
    grad.addColorStop(1, '#245a95');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    const rg = ctx.createRadialGradient(W * 0.55, H * 0.3, 0, W * 0.55, H * 0.3, H * 0.7);
    rg.addColorStop(0, 'rgba(30, 60, 130, 0.2)');
    rg.addColorStop(1, 'rgba(9, 21, 53, 0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  }

  function drawBgStars() {
    for (const s of bgStars) {
      const tw = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(190, 210, 255, ${s.alpha * tw})`;
      ctx.fill();
    }
  }

  function drawDust() {
    for (const d of dustMotes) {
      d.x += d.vx + Math.sin(time * 0.15 + d.phase) * 0.06;
      d.y += d.vy;
      if (d.y < -10) { d.y = H + 10; d.x = Math.random() * W; }
      const fl = 0.5 + 0.5 * Math.sin(time * 1.2 + d.phase);
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 210, 255, ${d.alpha * fl})`;
      ctx.fill();
    }
  }

  function drawBranches(progress) {
    for (const b of branches) {
      const depthRatio = b.depth / b.maxDepth;
      const branchProgress = Math.max(0, Math.min(1, (progress - depthRatio * 0.6) / 0.4));
      if (branchProgress <= 0) continue;
      const sway = Math.sin(time * b.swaySpeed + b.phase) * b.swayAmt;
      const px = sway * branchProgress;
      const px1 = sway * 0.3 * branchProgress;
      const x1 = b.x1 + px1;
      const y1 = b.y1;
      const x2 = b.x1 + (b.x2 - b.x1) * branchProgress + px;
      const y2 = b.y1 + (b.y2 - b.y1) * branchProgress;
      const alpha = (0.25 + (1 - depthRatio) * 0.5) * branchProgress;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = `rgba(15, 12, 30, ${alpha})`;
      ctx.lineWidth = b.thickness;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  function drawOrnamentStar(cx, cy, size, alpha, glowR) {
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    grd.addColorStop(0, `rgba(255, 215, 80, ${alpha * 0.35})`);
    grd.addColorStop(0.4, `rgba(255, 200, 60, ${alpha * 0.1})`);
    grd.addColorStop(1, 'rgba(255, 200, 60, 0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fill();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    const spikes = 5;
    const outerR = size;
    const innerR = size * 0.38;
    for (let i = 0; i < spikes * 2; i++) {
      const r = i % 2 === 0 ? outerR : innerR;
      const a = (i * Math.PI) / spikes - Math.PI / 2;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fillStyle = `rgba(255, 225, 110, ${alpha})`;
    ctx.shadowColor = `rgba(255, 210, 70, ${alpha * 0.8})`;
    ctx.shadowBlur = 4;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  const moonCache = new Map();
  function getMoonCanvas(size, alpha, rotation) {
    const key = `${Math.round(size)}_${Math.round(alpha * 100)}_${Math.round(rotation * 10)}`;
    if (moonCache.has(key)) return moonCache.get(key);
    const s = Math.ceil(size * 2 + 8);
    const oc = document.createElement('canvas');
    oc.width = s * 2; oc.height = s * 2;
    const octx = oc.getContext('2d');
    octx.translate(s, s);
    octx.rotate(rotation);
    octx.beginPath();
    octx.arc(0, 0, size, 0, Math.PI * 2);
    octx.fillStyle = `rgba(255, 225, 110, ${alpha})`;
    octx.shadowColor = `rgba(255, 210, 70, ${alpha * 0.6})`;
    octx.shadowBlur = 3;
    octx.fill();
    octx.globalCompositeOperation = 'destination-out';
    octx.beginPath();
    octx.arc(size * 0.32, -size * 0.18, size * 0.76, 0, Math.PI * 2);
    octx.fillStyle = 'rgba(0,0,0,1)';
    octx.fill();
    moonCache.set(key, { canvas: oc, s });
    if (moonCache.size > 200) moonCache.delete(moonCache.keys().next().value);
    return { canvas: oc, s };
  }

  function drawOrnamentMoon(cx, cy, size, alpha, glowR, rotation) {
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    grd.addColorStop(0, `rgba(255, 215, 80, ${alpha * 0.3})`);
    grd.addColorStop(0.4, `rgba(255, 200, 60, ${alpha * 0.08})`);
    grd.addColorStop(1, 'rgba(255, 200, 60, 0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fill();
    const { canvas: oc, s } = getMoonCanvas(size, alpha, rotation);
    ctx.drawImage(oc, cx - s, cy - s);
  }

  // ===================== WIND CHIME SWAY =====================
  function getElasticOffset(pgTime, fallDelay, fallDuration, fallStartY, targetY, phase, freqX, freqY, dampX, dampY) {
    const elapsed = pgTime - fallDelay;
    if (elapsed <= 0) return { y: fallStartY, x: 0, opacity: 0 };

    const fallPhase = fallDuration * 0.35;
    if (elapsed < fallPhase) {
      const t = elapsed / fallPhase;
      const eased = t * t * t * (t * (t * 6 - 15) + 10);
      const y = fallStartY + (targetY - fallStartY) * eased;
      return { y, x: 0, opacity: Math.min(1, t * 2.5) };
    }

    const swayElapsed = elapsed - fallPhase;
    const dampFactorY = Math.max(0.15, Math.pow(dampY, swayElapsed * 3));
    const dampFactorX = Math.max(0.15, Math.pow(dampX, swayElapsed * 3));
    const oscillationY = Math.sin(swayElapsed * freqY * Math.PI * 2 + phase) * dampFactorY * 25;
    const oscillationX = Math.sin(swayElapsed * freqX * Math.PI * 2 + phase + 1.3) * dampFactorX * 18;
    const y = targetY + oscillationY;
    return { y, x: oscillationX, opacity: 1.0 };
  }

  function drawOrnaments(progress, pgTime) {
    for (const o of ornaments) {
      if (o.branchRef) {
        const b = o.branchRef;
        const branchSway = Math.sin(time * b.swaySpeed + b.phase) * b.swayAmt;
        const anchorX = b.x2 + branchSway;
        const anchorY = b.y2;
        const targetY = anchorY + o.threadLen;
        const { y: currentY, x: elasticX, opacity } = getElasticOffset(
          pgTime, o.fallDelay, o.fallDuration, o.fallStartY, targetY,
          o.swayPhase, o.freqX, o.freqY, o.dampX, o.dampY
        );
        if (opacity <= 0) continue;
        const windSway = Math.sin(time * o.swaySpeed + o.phase) * o.swayAmt * 0.3;
        const endX = anchorX + elasticX + windSway;
        ctx.beginPath();
        ctx.moveTo(anchorX, anchorY);
        const cpX = anchorX + (elasticX + windSway) * 0.4;
        const cpY = anchorY + (currentY - anchorY) * 0.5;
        ctx.quadraticCurveTo(cpX, cpY, endX, currentY);
        ctx.strokeStyle = `rgba(210, 225, 245, ${0.3 * opacity})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
        const tw = 0.5 + 0.5 * Math.sin(time * o.twinkleSpeed + o.phase);
        const alpha = (0.5 + tw * 0.5) * opacity;
        if (o.type === 'star') {
          drawOrnamentStar(endX, currentY, o.size, alpha, o.glowR);
        } else {
          drawOrnamentMoon(endX, currentY, o.size, alpha, o.glowR, o.rotation);
        }
      } else {
        const anchorX = o.baseX + Math.sin(time * o.swaySpeed + o.phase) * o.swayAmt;
        const anchorY = o.baseY + Math.sin(time * 0.2 + o.phase) * 0.5;
        const tw = 0.5 + 0.5 * Math.sin(time * o.twinkleSpeed + o.phase);
        const alpha = 0.4 + tw * 0.4;
        if (o.type === 'star') {
          drawOrnamentStar(anchorX, anchorY, o.size, alpha, o.glowR);
        } else {
          drawOrnamentMoon(anchorX, anchorY, o.size, alpha, o.glowR, o.rotation);
        }
      }
    }
  }

  function drawVignette() {
    const grd = ctx.createRadialGradient(W * 0.5, H * 0.5, H * 0.25, W * 0.5, H * 0.5, H * 0.85);
    grd.addColorStop(0, 'rgba(0, 0, 0, 0)');
    grd.addColorStop(1, 'rgba(5, 10, 25, 0.4)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }

  function init() { resize(); }

  function animate() {
    time += 0.016;
    if (growProgress < 1) {
      growProgress = Math.min(1, growProgress + 0.016 / GROW_DURATION);
    } else {
      postGrowTime += 0.016;
    }
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawBgStars();
    updateAndDrawShootingStars();
    drawDust();
    drawBranches(growProgress);
    drawOrnaments(growProgress, postGrowTime);
    drawVignette();
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  init();
  animate();
})();
</script>
</body>
</html>
